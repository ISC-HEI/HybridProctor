name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
        
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ env.VERSION }}
          release_name: Release ${{ env.VERSION }}
          draft: false
          prerelease: false

  build-and-package:
    needs: create-release
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: armv7
            platform: linux/arm/v7
            image: arm32v7/node:22-slim
          - arch: arm64v8
            platform: linux/arm64
            image: arm64v8/node:22-slim
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        
      - name: Get version from tag
        id: get_version
        run: |
          echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
          FULL_VERSION=$(git describe --tags --always --first-parent --dirty=.dev)
          echo "FULL_VERSION=${FULL_VERSION}" >> $GITHUB_ENV

      - name: Build frontend
        working-directory: ${{ github.workspace }}/app/pages
        run: |
          npm install
          npm run build

      - name: Build and package
        run: |
          cat > build.sh << 'EOF'
          set -eux;
          apt-get update && apt-get install -y zip curl;

          NODE_PRUNE_ARCH="arm";
          if [ "$ARCH" = "arm64v8" ]; then
          NODE_PRUNE_ARCH="arm64";
          fi;
          curl -w '%{http_code}' -sL -o /usr/local/bin/node-prune "https://gobinaries.com/binary/github.com/tj/node-prune?os=linux&arch=$NODE_PRUNE_ARCH&version=v1.2.0" && chmod +x /usr/local/bin/node-prune;

          cd /app/app/backend; 
          npm i && npm run build; 

          cd /app; 
          mkdir -p release_package/pages; 
          cp -a app/pages/out/. release_package/pages/; 
          cp -r app/backend/dist release_package/; 
          cp app/backend/package.json app/backend/package-lock.json release_package/; 
          cp app/start.sh release_package

          cd release_package; 
          npm ci --omit=dev;
          /usr/local/bin/node-prune;
          npm version --no-git-tag-version "$FULL_VERSION"

          cd /app;
          cp app/backend/.env.native release_package/.env;
          mkdir -p release_package/proxy;
          cp proxy/nginx.conf proxy/default.conf release_package/proxy/;

          zip -r /app/hybrid-proctor-$VERSION-$ARCH.zip release_package;
          EOF

          docker run --rm --platform ${{ matrix.platform }} -e ARCH=${{ matrix.arch }} -e VERSION=${{ env.VERSION }} -e FULL_VERSION=${{ env.FULL_VERSION }} -v ${{ github.workspace }}:/app ${{ matrix.image }} /bin/bash /app/build.sh
      - name: Upload release asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ./hybrid-proctor-${{ env.VERSION }}-${{ matrix.arch }}.zip
          asset_name: hybrid-proctor-${{ matrix.arch }}.zip
          asset_content_type: application/zip
