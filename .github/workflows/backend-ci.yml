name: Backend CI

on:
  push:
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: ./app/backend/package-lock.json

    - name: Prepare pages
      working-directory: ./app/pages
      run: |
        set -eux

        npm ci
        npm run build

    - name: Prepare backend
      working-directory: ./app/backend
      run: |
        set -eux

        cd /app/app/backend
        cp -a app/pages/out/. pages/

    - name: Run unit tests
      working-directory: ./app/backend
      run: npm run unit-test

    - name: Run E2E tests
      working-directory: ./app/backend
      run: |
        set -eux

        npm run dev & wait-on http://localhost:3000
        npm run e2e-test
